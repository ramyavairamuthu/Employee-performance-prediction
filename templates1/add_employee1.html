{% extends "base1.html" %}
{% block content %}

<div class="card">
    <h2>Add Employee</h2>

    <form method="POST" class="form-linear">

        <label>Employee ID</label>
<input type="text" name="id" 
       pattern="E[0-9]{3}" 
       title="Employee ID must be in format E101"
       required>

        <label>Employee Name</label>
        <input type="text" name="name" required>

        <label>Department</label>
<select name="department" required>
    <option value="">Select Department</option>
    <option value="Sales">Sales</option>
    <option value="Technical">Technical</option>
    <option value="Support">Support</option>
    <option value="HR">HR</option>
    <option value="Management">Management</option>
</select>
<label>Base Salary</label>
<input type="number" name="salary" required>



        <label>Salary Level</label>
<select name="text" required>
    <option value="">Select Salary Range</option>
    <option value="low">Low (₹10,000 – ₹30,000)</option>
    <option value="medium">Medium (₹30,001 – ₹60,000)</option>
    <option value="high">High (Above ₹60,000)</option>
</select>


        <label>Satisfaction Level (0–1)</label>
        <input type="number" step="0.01" name="satisfaction" required>

        <label>Last Evaluation (0–1)</label>
        <input type="number" step="0.01" name="evaluation" required>

        <label>Number of Projects</label>
        <input type="number" name="projects" required>

        <label>Average Monthly Working Hours</label>
        <input type="number" name="hours" required>

        <label>Time Spent in Company (Years)</label>
        <input type="number" name="experience" required>

        <button type="submit" class="btn">Add Employee</button>

    </form>
</div>

{% endblock %}
